<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BizFind — The Ultimate Local Business Directory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#6366f1',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 8s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-white text-slate-900 selection:bg-blue-100">

    <header class="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="container mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-1.5 rounded-lg text-white shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                </div>
                <span class="text-xl font-black tracking-tight text-blue-600">BizFind</span>
            </div>
            
            <nav class="hidden md:flex gap-8 text-sm font-semibold text-slate-500">
                <a href="#" class="hover:text-blue-600 transition-colors">All Listings</a>
                <a href="#" class="hover:text-blue-600 transition-colors">Categories</a>
                <a href="#" class="hover:text-blue-600 transition-colors">Map View</a>
            </nav>

            <div class="flex items-center gap-3">
                <button class="px-5 py-2 text-sm font-bold border border-slate-200 rounded-full hover:bg-slate-50 transition">Sign In</button>
                <button class="px-5 py-2 text-sm font-bold bg-slate-900 text-white rounded-full hover:bg-slate-800 transition shadow-md">Get Listed Free</button>
            </div>
        </div>
    </header>

    <main>
        <section class="relative pt-24 pb-32 overflow-hidden bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-white to-white">
            <div class="container mx-auto px-6 text-center">
                
                <div class="inline-flex items-center rounded-full bg-blue-50 border border-blue-100 px-4 py-1.5 text-sm font-bold text-blue-600 mb-10 shadow-sm">
                    <span class="w-2.5 h-2.5 rounded-full bg-blue-600 mr-2 animate-pulse"></span>
                    Discover Local Excellence
                </div>

                <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-8 leading-[0.9]">
                    Find the right <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-500 to-blue-600 animate-gradient-x">local business</span><br>
                    for you.
                </h1>

                <p class="text-xl text-slate-500 max-w-2xl mx-auto mb-14 leading-relaxed font-medium">
                    Search over 50+ categories of trusted professionals, read genuine reviews, and get connected instantly.
                </p>

                <div class="max-w-4xl mx-auto bg-white p-2.5 rounded-[2rem] shadow-[0_20px_50px_rgba(8,_112,_184,_0.1)] border border-slate-100 flex flex-col md:flex-row items-center group transition-all hover:shadow-[0_20px_50px_rgba(8,_112,_184,_0.2)]">
                    <div class="flex items-center w-full px-5 py-3 gap-3">
                        <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                        <input type="text" class="w-full outline-none text-lg placeholder:text-slate-400 font-medium" placeholder="What are you looking for?">
                    </div>
                    
                    <div class="hidden md:block w-px h-10 bg-slate-100"></div>
                    
                    <div class="flex items-center w-full px-5 py-3 gap-3">
                        <svg class="text-slate-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <input type="text" class="w-full outline-none text-lg placeholder:text-slate-400 font-medium" placeholder="Location">
                    </div>

                    <button class="w-full md:w-auto bg-blue-600 text-white px-12 py-4 rounded-[1.5rem] font-black text-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 active:scale-95">
                        Search
                    </button>
                </div>

                <div class="mt-16 flex flex-wrap justify-center gap-10 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
                    <div class="flex items-center gap-2 font-bold italic"><span class="text-2xl">50+</span> Categories</div>
                    <div class="flex items-center gap-2 font-bold italic"><span class="text-2xl">10k+</span> Businesses</div>
                    <div class="flex items-center gap-2 font-bold italic"><span class="text-2xl">100%</span> Verified</div>
                </div>

            </div>
        </section>
    </main>

</body>
</html>
